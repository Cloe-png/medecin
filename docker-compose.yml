version: "3.8"

services:
  app:
    build: .
    container_name: medecin-app
    ports:
      - "8000:80"
    env_file:
      - .env.docker
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: medecin-db
    environment:
      MYSQL_DATABASE: medecin
      MYSQL_USER: medecin
      MYSQL_PASSWORD: medecin
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - medecin_db:/var/lib/mysql

volumes:
  medecin_db: